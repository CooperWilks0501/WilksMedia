    <!-- Structured data: tells Google this is a business -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "WilksMedia",
        "alternateName": "Wilks Media",
        "url": "https://wilksmedia.com/",
        "logo": "https://wilksmedia.com/WilksMediaLogo.png",
        "image": "https://wilksmedia.com/WilksMediaLogo.png",
        "description": "Premium small-business website design, development, and ongoing upkeep. Solo studio founded by Cooper Wilks.",
        "founder": {
          "@type": "Person",
          "name": "Cooper Wilks",
          "alumniOf": "University of South Carolina"
        },
        "areaServed": {
          "@type": "City",
          "name": "Columbia, SC"
        },
        "email": "cooper@wilksmedia.com",
        "sameAs": [
          "https://instagram.com/wilks_media_",
          "https://github.com/CooperWilks0501"
        ]
      }
    </script>

    <!-- GitHub Pages SPA fallback decoder: paired with public/404.html. -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
